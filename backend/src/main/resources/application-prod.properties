# CONFIGURAZIONE PRODUZIONE (PROD)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# In produzione meglio disattivare la modifica automatica delle tabelle
spring.jpa.hibernate.ddl-auto=none

spring.security.oauth2.resourceserver.jwt.issuer-uri=${SUPABASE_JWT_ISSUER}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_JWT_JWKS}

logging.level.org.springframework.security=INFO