<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>CEDeasy - Dashboard SMM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        /* Personalizzazione FullCalendar per adattarsi al design */
        .fc { --fc-border-color: #e2e8f0; --fc-button-bg-color: #4f46e5; --fc-button-border-color: #4f46e5; }
        .fc-event { cursor: pointer; border-radius: 6px; padding: 2px 4px; border: none; }
        .brand-link.active { background-color: #eef2ff; color: #4f46e5; font-weight: 700; border-right: 4px solid #4f46e5; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shadow-sm">
        <div class="p-6 text-2xl font-black text-indigo-600 italic">CEDeasy</div>
        <nav class="flex-1 px-4 overflow-y-auto">
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest px-2 mb-4">I tuoi Clienti</p>
            <ul id="recentBrands" class="space-y-1 mb-6">
                </ul>
            <a href="crm-clienti.html" class="flex items-center px-2 py-3 text-sm font-semibold text-slate-600 hover:bg-slate-50 rounded-xl transition-all">
                📁 Gestione Clienti (CRM)
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="p-6 bg-white border-b border-slate-200 flex justify-between items-center">
            <div>
                <h2 class="text-xl font-bold text-slate-800">Calendario Editoriale</h2>
                <p id="currentBrandName" class="text-sm text-slate-500 italic">Seleziona un cliente per iniziare</p>
            </div>
            <div class="flex gap-2">
                <button onclick="copyInviteLink()" class="flex items-center gap-2 bg-white text-indigo-600 border border-indigo-100 px-4 py-2 rounded-lg font-bold text-sm shadow-sm hover:bg-indigo-50 transition-all">
                    🔗 Copia Link Invito Cliente
                </button>
                <button onclick="openPostModal()" class="bg-emerald-500 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-md hover:bg-emerald-600 transition-all">
                    + Nuovo Post
                </button>
            </div>
        </header>

        <div class="p-8 overflow-y-auto flex-1">
            <div id="main-content" class="bg-white rounded-3xl p-6 shadow-sm min-h-[600px] relative">
                <div id="calendar-placeholder" class="flex flex-col items-center justify-center h-96 text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <p class="text-lg font-medium">Scegli un brand dalla lista a sinistra</p>
                </div>
                
                <div id="calendar" class="hidden"></div>
            </div>
        </div>
    </main>

    <div id="postModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-xl overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-xl font-bold text-slate-800" id="modalTitle">Nuovo Post</h3>
                <button onclick="closePostModal()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
            </div>
            
            <form id="postForm">
                <input type="hidden" id="postId">
                <div class="p-6 space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Titolo Interno</label>
                        <input type="text" id="title" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Copy (Contenuto Social)</label>
                        <textarea id="content" rows="4" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Cosa scriverai nel post?"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Data</label>
                            <input type="date" id="scheduledDate" required class="w-full px-4 py-2 border border-slate-200 rounded-lg outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Piattaforma</label>
                            <select id="platform" required class="w-full px-4 py-2 border border-slate-200 rounded-lg outline-none bg-white">
                                <option value="INSTAGRAM">Instagram 📸</option>
                                <option value="FACEBOOK">Facebook 👥</option>
                                <option value="LINKEDIN">LinkedIn 🔗</option>
                                <option value="TIKTOK">TikTok 🎵</option>
                                <option value="TELEGRAM">Telegram ✈️</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Link Media (Drive/Canva)</label>
                        <input type="url" id="mediaLink" placeholder="https://..." class="w-full px-4 py-2 border border-slate-200 rounded-lg outline-none">
                    </div>
                </div>
                
                <div class="p-6 bg-slate-50 flex justify-between items-center">
                    <button type="button" id="deletePostBtn" class="text-red-500 font-bold hover:underline hidden">Elimina Post</button>
                    <div class="flex gap-3 ml-auto">
                        <button type="button" onclick="closePostModal()" class="px-4 py-2 text-slate-500 font-bold">Annulla</button>
                        <button type="submit" class="px-6 py-2 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 shadow-md transition-all">Salva</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="dashboard-controller.js"></script>
</body>
</html>
