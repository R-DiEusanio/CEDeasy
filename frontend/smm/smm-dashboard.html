<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>CEDeasy - Dashboard SMM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shadow-sm">
        <div class="p-6 text-2xl font-black text-indigo-600 italic">CEDeasy</div>
        <nav class="flex-1 px-4">
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest px-2 mb-4">Clienti più recenti...</p>
            <div id="recentBrands" class="space-y-1 mb-6"></div>
            <a href="crm-clienti.html" class="flex items-center px-2 py-3 text-sm font-semibold text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all">
                📁 Visualizza tutti i clienti
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="p-6 bg-white border-b border-slate-200 flex justify-between items-center">
            <h2 class="text-xl font-bold text-slate-800">Calendario Editoriale</h2>
            <button onclick="window.location.href='crm-clienti.html'" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-lg hover:bg-indigo-700">
                + Gestisci i Clienti
            </button>
        </header>
        <div class="p-8">
            <div id="calendar-container" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 min-h-[600px]">
                <p class="text-slate-400 italic">Pronto per l'integrazione del Calendario...</p>
            </div>
        </div>
    </main>

    <script src="smm-logic.js"></script>
</body>
</html>
