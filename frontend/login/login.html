<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEDeasy - Login</title>
    <link rel="stylesheet" href="../src/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8 border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-indigo-600 italic">CEDeasy</h1>
            <p class="text-slate-500 font-medium">Bentornato! Accedi al tuo account</p>
        </div>

        <form id="login-form" class="space-y-5">
            <div class="space-y-1">
                <label class="text-sm font-semibold text-slate-700 ml-1">Email</label>
                <input type="email" id="login-email" placeholder="mario@esempio.it" required 
                    class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            </div>

            <div class="space-y-1">
                <label class="text-sm font-semibold text-slate-700 ml-1">Password</label>
                <input type="password" id="login-password" placeholder="••••••••" required 
                    class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 active:scale-95">
                Accedi
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-slate-500 font-medium">
                Non hai ancora un account? 
                <a href="index.html" class="text-indigo-600 font-bold hover:underline transition-all">Registrati</a>
            </p>
        </div>
    </div>

    <script type="module" src="./login.js"></script>
</body>
</html>
