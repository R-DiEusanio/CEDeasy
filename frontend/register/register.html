<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrati su CedEasy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --gradient-brand: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
        }
        .bg-gradient-brand { background: var(--gradient-brand); }
        .text-gradient-brand {
            background: var(--gradient-brand);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="flex items-center justify-center gap-2 mb-8">
            <div class="grid h-10 w-10 place-items-center rounded-2xl text-white bg-gradient-brand shadow-lg">
                <i data-lucide="sparkles" class="h-5 w-5"></i>
            </div>
            <span class="text-2xl font-bold text-slate-900">CedEasy</span>
        </div>

        <div class="bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-100">
            <h1 class="text-2xl font-bold text-slate-900 mb-2">Crea il tuo account</h1>
            <p class="text-slate-500 text-sm mb-8">Pochi secondi per iniziare a usare CedEasy.</p>

            <!-- Form di registrazione -->
            <form id="reg-form" class="space-y-4" novalidate>
                <input type="hidden" id="user-role" name="role" value="SMM">
                
                <!-- Nome Completo -->
                <div class="space-y-1.5">
                    <label for="full_name" class="block text-xs font-bold text-slate-400 uppercase mb-1 ml-1">Nome Completo</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-400 pointer-events-none"></i>
                        <input 
                            type="text" 
                            id="full_name" 
                            placeholder="Mario Rossi" 
                            autocomplete="name"
                            required 
                            class="w-full px-4 py-3 pl-9 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                        >
                    </div>
                    <p id="name-error" class="text-xs font-medium text-red-500 hidden mt-1"></p>
                </div>

                <!-- Email -->
                <div class="space-y-1.5">
                    <label for="email" class="block text-xs font-bold text-slate-400 uppercase mb-1 ml-1">Email</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-400 pointer-events-none"></i>
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="nome@brand.com" 
                            autocomplete="email"
                            required 
                            class="w-full px-4 py-3 pl-9 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                        >
                    </div>
                    <p id="email-error" class="text-xs font-medium text-red-500 hidden mt-1"></p>
                </div>

                <!-- Password -->
                <div class="space-y-1.5">
                    <label for="password" class="block text-xs font-bold text-slate-400 uppercase mb-1 ml-1">Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-400 pointer-events-none"></i>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="Minimo 8 caratteri" 
                            autocomplete="new-password"
                            required 
                            class="w-full px-4 py-3 pl-9 pr-10 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                        >
                        <button 
                            type="button" 
                            id="toggle-password"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors p-1 rounded-md"
                            aria-label="Toggle password visibility"
                        >
                            <i data-lucide="eye" class="h-4 w-4" id="eye-icon"></i>
                        </button>
                    </div>
                    <p id="password-error" class="text-xs font-medium text-red-500 hidden mt-1"></p>
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit" 
                    id="submit-btn"
                    class="w-full h-11 bg-gradient-brand text-white font-bold rounded-2xl shadow-lg shadow-indigo-100 hover:opacity-90 transition-opacity mt-6 flex items-center justify-center gap-2"
                >
                    <span id="submit-text">Crea account</span>
                    <i id="submit-loader" data-lucide="loader-2" class="h-4 w-4 animate-spin hidden"></i>
                </button>

                <p class="pt-2 text-center text-[11px] text-slate-500">
                    Registrandoti accetti i Termini e la Privacy Policy di CedEasy.
                </p>
            </form>
        </div>

        <p class="text-center mt-8 text-sm text-slate-500">
            Hai già un account? <a href="../login/login.html" class="text-indigo-600 font-bold hover:underline">Accedi</a>
        </p>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script type="module" src="./register.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
