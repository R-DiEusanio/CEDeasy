<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEDeasy - Registrazione</title>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8 border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-indigo-600 italic">CEDeasy</h1>
            <p class="text-slate-500 font-medium">Crea il tuo account</p>
        </div>

        <form id="reg-form" class="space-y-5">
            <div class="space-y-1">
                <label class="text-sm font-semibold text-slate-700 ml-1">Nome Completo</label>
                <input type="text" id="full_name" placeholder="Mario Rossi" required 
                    class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            </div>

            <div class="space-y-1">
                <label class="text-sm font-semibold text-slate-700 ml-1">Email</label>
                <input type="email" id="email" placeholder="mario@esempio.it" required 
                    class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            </div>

            <div class="space-y-1">
                <label class="text-sm font-semibold text-slate-700 ml-1">Password</label>
                <input type="password" id="password" placeholder="••••••••" required 
                    class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            </div>

            <div class="space-y-2">
                <label class="text-sm font-semibold text-slate-700 ml-1">Il tuo ruolo</label>
                <div class="grid grid-cols-2 gap-4">
                    <button type="button" id="role-smm" class="role-btn group border-2 border-slate-100 p-4 rounded-2xl flex flex-col items-center hover:border-indigo-200 transition-all">
                        <span class="text-3xl mb-2">🚀</span>
                        <span class="font-bold text-slate-800">SMM</span>
                        <span class="text-[10px] text-slate-400 text-center leading-tight line-clamp-1">Gestisco brand</span>
                    </button>
                    <button type="button" id="role-client" class="role-btn group border-2 border-indigo-500 bg-indigo-50 p-4 rounded-2xl flex flex-col items-center transition-all">
                        <span class="text-3xl mb-2">🤝</span>
                        <span class="font-bold text-indigo-600">Cliente</span>
                        <span class="text-[10px] text-indigo-400 text-center leading-tight line-clamp-1">Approvo post</span>
                    </button>
                </div>
            </div>

            <input type="hidden" id="user-role" value="CLIENT">

            <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 active:scale-95">
                Inizia ora
            </button>
        </form>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
